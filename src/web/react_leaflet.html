<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React + Leaflet Route Planner</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Tailwind CSS (Clean Layout styling) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Axios CDN -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0F172A;
            color: #F8FAFC;
        }
        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }
        #map {
            height: 100%;
            width: 100%;
            background-color: #1E293B;
        }
        /* Custom Leaflet Marker Styling */
        .leaflet-div-icon {
            background: #38BDF8;
            border: 2px solid #0F172A;
            border-radius: 50%;
            color: #0F172A;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
        }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- React Component using Babel -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Base geographic mapping factors for Metroville Cartesian coords -> NYC LatLng
        const NYC_LAT = 40.7128;
        const NYC_LNG = -74.0060;
        const SCALE = 0.003; // Scaling offset factor

        function cartesianToLatLng(x, y) {
            return [NYC_LAT + y * SCALE, NYC_LNG + x * SCALE];
        }

        // Metroville static nodes list for geocoding mapping
        const nodesData = [
            {id: "A", name: "Downtown", x: 10.0, y: 10.0},
            {id: "B", name: "Central Station", x: 12.0, y: 15.0},
            {id: "C", name: "Suburbs", x: 3.0, y: 18.0},
            {id: "D", name: "Tech Park", x: 25.0, y: 12.0},
            {id: "E", name: "Airport", x: 28.0, y: 25.0},
            {id: "F", name: "Industrial Zone", x: 15.0, y: 2.0},
            {id: "G", name: "Medical Center", x: 5.0, y: 9.0},
            {id: "H", name: "Harbor", x: 2.0, y: 3.0},
            {id: "I", name: "University District", x: 8.0, y: 14.0},
            {id: "J", name: "Shopping Mall", x: 18.0, y: 8.0}
        ];

        const edgesData = [
            {source: "A", target: "B"}, {source: "A", target: "G"}, {source: "A", target: "J"},
            {source: "B", target: "I"}, {source: "I", target: "C"}, {source: "G", target: "I"},
            {source: "G", target: "H"}, {source: "H", target: "F"}, {source: "F", target: "A"},
            {source: "F", target: "J"}, {source: "J", target: "D"}, {source: "B", target: "J"},
            {source: "C", target: "E"}, {source: "D", target: "E"}, {source: "B", target: "E"}
        ];

        function DashboardApp() {
            const [startNode, setStartNode] = useState("A");
            const [targetNode, setTargetNode] = useState("E");
            const [metric, setMetric] = useState("time");
            const [timeWeight, setTimeWeight] = useState(0.5);
            const [distWeight, setDistWeight] = useState(0.5);
            const [routeData, setRouteData] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");
            const [loading, setLoading] = useState(false);

            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const polylineRef = useRef(null);
            const markersGroupRef = useRef(null);
            const baseRoadsGroupRef = useRef(null);

            // Initialize Leaflet Map
            useEffect(() => {
                const mapCenter = cartesianToLatLng(15, 12);
                mapInstance.current = L.map('map', {
                    zoomControl: false
                }).setView(mapCenter, 13);

                // Add dark-themed CartoDB map tiles
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
                }).addTo(mapInstance.current);

                L.control.zoom({ position: 'topright' }).addTo(mapInstance.current);

                markersGroupRef.current = L.layerGroup().addTo(mapInstance.current);
                baseRoadsGroupRef.current = L.layerGroup().addTo(mapInstance.current);

                // Draw base roads (thin gray lines)
                edgesData.forEach(edge => {
                    const s = nodesData.find(n => n.id === edge.source);
                    const t = nodesData.find(n => n.id === edge.target);
                    if (s && t) {
                        L.polyline([cartesianToLatLng(s.x, s.y), cartesianToLatLng(t.x, t.y)], {
                            color: '#475569',
                            weight: 2,
                            opacity: 0.5
                        }).addTo(baseRoadsGroupRef.current);
                    }
                });

                // Draw node markers
                nodesData.forEach(node => {
                    const coords = cartesianToLatLng(node.x, node.y);
                    const customIcon = L.divIcon({
                        html: node.id,
                        className: 'leaflet-div-icon',
                        iconSize: [24, 24]
                    });

                    L.marker(coords, { icon: customIcon })
                        .bindPopup(`<b>${node.name}</b> (${node.id})`)
                        .addTo(markersGroupRef.current);
                });

                return () => {
                    mapInstance.current.remove();
                };
            }, []);

            // Handle route requests
            const handleRouteRequest = async () => {
                if (startNode === targetNode) {
                    setErrorMsg("Origin and Destination must be different.");
                    return;
                }
                setErrorMsg("");
                setLoading(true);

                const payload = {
                    source: startNode,
                    destination: targetNode,
                    metric: metric,
                    weights: metric === "weighted" ? { time: parseFloat(timeWeight), distance: parseFloat(distWeight) } : null,
                    closures: [],
                    traffic: []
                };

                try {
                    const resp = await axios.post("http://127.0.0.1:8000/route", payload);
                    setRouteData(resp.data);
                    
                    // Draw route polyline
                    if (polylineRef.current) {
                        mapInstance.current.removeLayer(polylineRef.current);
                    }

                    const pathNodes = resp.data.path;
                    const pathLatLngs = pathNodes.map(nodeId => {
                        const node = nodesData.find(n => n.id === nodeId);
                        return cartesianToLatLng(node.x, node.y);
                    });

                    polylineRef.current = L.polyline(pathLatLngs, {
                        color: '#38BDF8',
                        weight: 6,
                        opacity: 0.9
                    }).addTo(mapInstance.current);

                    // Fit map viewport bounds to route
                    mapInstance.current.fitBounds(polylineRef.current.getBounds(), { padding: [50, 50] });

                } catch (err) {
                    console.error(err);
                    setErrorMsg(err.response?.data?.detail || "Failed to reach routing API. Make sure FastAPI server is running.");
                    setRouteData(null);
                    if (polylineRef.current) {
                        mapInstance.current.removeLayer(polylineRef.current);
                        polylineRef.current = null;
                    }
                } finally {
                    setLoading(false);
                }
            };

            const handleWeightChange = (type, val) => {
                const num = parseFloat(val);
                if (type === 'time') {
                    setTimeWeight(num);
                    setDistWeight(parseFloat((1.0 - num).toFixed(1)));
                } else {
                    setDistWeight(num);
                    setTimeWeight(parseFloat((1.0 - num).toFixed(1)));
                }
            };

            return (
                <div class="flex h-full w-full">
                    {/* Control Panel Sidebar */}
                    <div class="w-80 bg-slate-900 border-r border-slate-800 p-6 flex flex-col gap-6 overflow-y-auto">
                        <div class="brand flex items-center gap-3 pb-4 border-b border-slate-800">
                            <span class="text-3xl">⚛️</span>
                            <div>
                                <h1 class="text-lg font-bold text-white tracking-tight">React Leaflet UI</h1>
                                <p class="text-xs text-slate-400">FastAPI Route Visualizer</p>
                            </div>
                        </div>

                        <div class="flex flex-col gap-4">
                            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Parameters</h2>
                            
                            {/* Start Node */}
                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs text-slate-400">Start Node</label>
                                <select 
                                    class="bg-slate-950 border border-slate-850 p-2.5 rounded-lg text-sm text-slate-200 focus:outline-none focus:border-sky-500"
                                    value={startNode}
                                    onChange={(e) => setStartNode(e.target.value)}
                                >
                                    {nodesData.map(n => <option key={n.id} value={n.id}>{n.name} ({n.id})</option>)}
                                </select>
                            </div>

                            {/* Destination Node */}
                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs text-slate-400">Destination Node</label>
                                <select 
                                    class="bg-slate-950 border border-slate-850 p-2.5 rounded-lg text-sm text-slate-200 focus:outline-none focus:border-sky-500"
                                    value={targetNode}
                                    onChange={(e) => setTargetNode(e.target.value)}
                                >
                                    {nodesData.map(n => <option key={n.id} value={n.id}>{n.name} ({n.id})</option>)}
                                </select>
                            </div>

                            {/* Objective Metric Selector */}
                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs text-slate-400">Routing Objective</label>
                                <select 
                                    class="bg-slate-950 border border-slate-850 p-2.5 rounded-lg text-sm text-slate-200 focus:outline-none focus:border-sky-500"
                                    value={metric}
                                    onChange={(e) => setMetric(e.target.value)}
                                >
                                    <option value="time">Travel Time (Fastest)</option>
                                    <option value="distance">Physical Distance (Shortest)</option>
                                    <option value="weighted">Weighted Multi-Objective</option>
                                </select>
                            </div>

                            {/* Sliders for Weighted Objective */}
                            {metric === "weighted" && (
                                <div class="flex flex-col gap-3 p-3 bg-slate-950 border border-slate-850 rounded-lg">
                                    <div class="flex flex-col gap-1">
                                        <div class="flex justify-between text-xs text-slate-400">
                                            <span>Time weight</span>
                                            <span class="font-mono">{timeWeight}</span>
                                        </div>
                                        <input 
                                            type="range" min="0" max="1" step="0.1" 
                                            value={timeWeight}
                                            onChange={(e) => handleWeightChange('time', e.target.value)}
                                            class="accent-sky-400"
                                        />
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <div class="flex justify-between text-xs text-slate-400">
                                            <span>Distance weight</span>
                                            <span class="font-mono">{distWeight}</span>
                                        </div>
                                        <input 
                                            type="range" min="0" max="1" step="0.1" 
                                            value={distWeight}
                                            onChange={(e) => handleWeightChange('dist', e.target.value)}
                                            class="accent-sky-400"
                                        />
                                    </div>
                                </div>
                            )}

                            {errorMsg && (
                                <div class="p-3 bg-red-950/40 border border-red-900 rounded-lg text-xs text-red-400 leading-relaxed">
                                    {errorMsg}
                                </div>
                            )}

                            <button 
                                class="w-full bg-sky-400 hover:bg-sky-500 text-slate-950 font-bold py-3 px-4 rounded-lg text-sm transition-all shadow-md active:translate-y-px"
                                onClick={handleRouteRequest}
                                disabled={loading}
                            >
                                {loading ? "Calculating..." : "Plan Route"}
                            </button>
                        </div>

                        {/* Route Summary Statistics Card */}
                        {routeData && (
                            <div class="mt-auto p-4 bg-slate-950 border border-slate-850 rounded-lg flex flex-col gap-3">
                                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Metrics Output</h3>
                                <div class="grid grid-cols-2 gap-3 text-center">
                                    <div class="bg-slate-900 p-2 border border-slate-800 rounded-md">
                                        <div class="text-sky-400 font-bold text-base leading-tight">{routeData.total_distance_km.toFixed(2)} km</div>
                                        <div class="text-[9px] text-slate-500 font-medium tracking-wider">DISTANCE</div>
                                    </div>
                                    <div class="bg-slate-900 p-2 border border-slate-800 rounded-md">
                                        <div class="text-sky-400 font-bold text-base leading-tight">{routeData.total_duration_minutes.toFixed(1)} m</div>
                                        <div class="text-[9px] text-slate-500 font-medium tracking-wider">DURATION</div>
                                    </div>
                                </div>
                                <div class="text-[10px] text-slate-400 leading-normal border-t border-slate-850 pt-2 font-mono break-all max-h-24 overflow-y-auto">
                                    <b>Path:</b> {routeData.path.join(" ➔ ")}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Leaflet Map Viewer */}
                    <div class="flex-1 relative">
                        <div id="map"></div>
                    </div>
                </div>
            );
        }

        // Render the component
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardApp />);
    </script>
</body>
</html>
